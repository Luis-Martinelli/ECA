<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio de Comprovante de Abastecimento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="page-header">
    <div class="container">
      <div class="h-top d-flex align-items-center text-center">
        <i class="bi bi-fuel-pump header-icon"></i>
        <div>
          <h1>Comprovante de Abastecimento</h1>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Form -->
  <main class="container pb-5 pt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-7">
        <div class="card form-card">
          <div class="card-header-custom">
            <div class="d-flex align-items-start gap-3">
              <div class="card-header-icon">
                <i class="bi bi-file-earmark-text"></i>
              </div>
              <div>
                <h2>Formulário de Envio</h2>
                <p>Preencha os dados abaixo e anexe a foto do comprovante.</p>
              </div>
            </div>
          </div>

          <div class="card-body-custom">
            <form id="receiptForm" novalidate>
              <!-- Nome do Motorista -->
              <div class="mb-4">
                <label for="driverName" class="form-label">
                  Nome <span class="required">*</span>
                </label>
                <div class="input-group input-group-custom">
                  <span class="input-group-text">
                    <i class="bi bi-person"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    id="driverName"
                    placeholder="Ex: SD PM Billy"
                    oninput="this.value = this.value.toUpperCase();"
                    required
                  >
                </div>
              </div>

              <!-- Prefixo do Veículo -->
              <div class="mb-4">
                <label for="vehiclePrefix" class="form-label">
                  Prefixo da Viatura <span class="required">*</span>
                </label>
                <div class="input-group input-group-custom">
                  <span class="input-group-text">
                    <i class="bi bi-car-front"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    id="vehiclePrefix"
                    placeholder="Ex: I-12000"
                    oninput="this.value = this.value.toUpperCase();"
                    required
                  >
                </div>
              </div>

              <!-- Comprovante de Abastecimento -->
              <div class="mb-4">
                <label class="form-label">
                  Comprovante de Abastecimento <span class="required">*</span>
                </label>
                <input
                  type="file"
                  id="fileInput"
                  accept=".jpg,.jpeg,.pdf"
                  required
                >
                <label for="fileInput" class="upload-area d-block mb-0">
                  <i class="bi bi-cloud-arrow-up upload-icon"></i>
                  <span class="upload-link">Clique para selecionar o arquivo</span>
                  <p class="upload-hint">Formatos aceitos: JPG, JPEG ou PDF</p>
                  <p class="upload-hint">Tamanho máximo: 5MB</p>
                </label>
                <p id="fileName" class="file-selected d-none"></p>
                <p class="upload-info mb-0">
                  <i class="bi bi-info-circle me-1"></i>
                  O arquivo deve ser uma foto nítida do comprovante.
                </p>
              </div>

              <!-- Submit -->
              <button type="submit" class="btn btn-primary btn-submit w-100">
                <i class="bi bi-send me-2"></i>
                Enviar Comprovante
              </button>
            
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
